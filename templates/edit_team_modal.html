<form method="POST" action="{{ url_for('edit_team', tourn_id=tourn_id, team_id=data.id) }}"
      class="ajax-form"> 

    {{ form.hidden_tag() }} 

    <h2>Edit Team: {{ data.name }}</h2> 

    <div id="form-errors" style="color: red;"></div>

    <label for="{{ form.name.id }}">{{form.name.label}}:</label><br>
    {{ form.name(class_="form-control") }} 
    
    <br><br>

    <label for="{{ form.score.id }}">{{ form.score.label }}:</label><br>
    {{ form.score(class_="form-control") }} 
    
    <br><br>
    
    <button type="submit" class="button-sub">Update Team</button>
</form>
