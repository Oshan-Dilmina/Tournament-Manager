{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="mb-4">
            <h2 class="fw-bold text-dark">
                <i class="fas fa-plus-circle me-2 text-primary"></i>Create New Tournament
            </h2>
            <p class="text-muted">Fill in the details below to initialize your tournament bracket.</p>
        </div>

        <div class="card shadow-sm border-0" style="border-radius: 15px;">
            <div class="card-body p-4 p-md-5">
                <form method="POST" action="{{ url_for('new_tourn_route') }}">
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase text-muted">General Information</label>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control border-0 bg-light" id="name" name="name" placeholder="Tournament Name" required style="border-radius: 10px;">
                            <label for="name">Tournament Name</label>
                        </div>
                        
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <select class="form-select border-0 bg-light" id="type" name="type" required style="border-radius: 10px;">
                                        <option value="solo">Solo (1v1)</option>
                                        <option value="teamed">Teamed</option>
                                    </select>
                                    <label for="type">Participant Type</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <select class="form-select border-0 bg-light" id="strict" name="strict" required style="border-radius: 10px;">
                                        <option value="False" selected>Standard Swiss</option>
                                        <option value="True">Strict Swiss</option>
                                    </select>
                                    <label for="strict">System Strictness</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr class="my-4 text-muted opacity-25">

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase text-muted d-block mb-3">Scoring & Point System</label>
                        
                        <div class="form-check p-3 mb-2 border rounded-3 bg-light opacity-75">
                            <input class="form-check-input ms-0 me-3" type="radio" id="classic" name="pointsys" value="classic" checked disabled>
                            <label class="form-check-label" for="classic">
                                <strong>Classic Scoring</strong><br>
                                <span class="small text-muted">Win: 1 | Loss: 0 | Draw: 0.5 | BYE: 1</span>
                            </label>
                        </div>

                        <div class="form-check p-3 mb-2 border rounded-3 bg-light opacity-75">
                            <input class="form-check-input ms-0 me-3" type="radio" id="manual" name="pointsys" value="manual" disabled>
                            <label class="form-check-label" for="manual">
                                <strong>Manual Set</strong><br>
                                <span class="small text-muted">Manually input points for every single match.</span>
                            </label>
                        </div>

                        <div class="form-check p-3 mb-2 border rounded-3 border-primary" style="background-color: #f8fbff;">
                            <input class="form-check-input ms-0 me-3" type="radio" id="margin" name="pointsys" value="margin" onchange="toggleMarginSettings(true)" checked>
                            <label class="form-check-label" for="margin">
                                <strong>Margin Calculation</strong><br>
                                <span class="small text-muted">Calculate points based on score difference.</span>
                            </label>
                            
                            <div id="margin-settings" class="mt-3 ps-4" style="display: block;">
                                <div class="d-flex align-items-center">
                                    <label for="margin_bye_points" class="small fw-bold me-3">Points for BYE:</label>
                                    <input type="number" id="margin_bye_points" name="margin_bye_points" class="form-control form-control-sm border-0 bg-white shadow-sm" value="1" step="0.5" style="width: 80px; border-radius: 8px;">
                                </div>
                            </div>
                        </div>
                    </div>

                    <input type="hidden" name="status" value="Open">

                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill py-3 fw-bold shadow-sm">
                            <i class="fas fa-check-circle me-2"></i>Initialize Tournament
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleMarginSettings(show) {
        document.getElementById('margin-settings').style.display = show ? 'block' : 'none';
    }
</script>
{% endblock %}
