{% extends "base.html" %}

{% block content %}


<div class="error-container">
    <div class="error-code text-orange">{{ code }}</div>
    <h1 class="fw-bold">Access Denied</h1>
    <p class="error-msg">
        You don't have the required permissions for this tournament.<br>
        <small class="text-muted">Detail: {{ e.description if e.description else e }}</small>
    </p>
    
    <div class="d-flex justify-content-center gap-3">
        <a href="javascript:history.back()" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-2"></i>Go Back
        </a>
        
        {% if not session.get('user') %}
            <a href="{{ url_for('auth.login') }}" class="btn btn-primary">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </a>
        {% else %}
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                <i class="fas fa-home me-2"></i>Return Home
            </a>
        {% endif %}
    </div>
</div>
{% endblock %}
