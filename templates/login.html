{% extends "base.html" %}

{% block content %}
<div class="container" style="margin-top: 10vh;">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg border-0 p-4" style="border-radius: 20px; background: #ffffff;">
                <div class="card-body text-center">
                    <div class="mb-4">
                        <div class="bg-light d-inline-block p-4 rounded-circle mb-3">
                            <i class="fas fa-user-shield fa-3x text-primary"></i>
                        </div>
                        <h2 class="fw-bold text-dark">Admin Portal</h2>
                        <p class="text-muted small">Please sign in to manage tournaments</p>
                    </div>
                    
                    <form action="{{ url_for('auth.login') }}" method="POST">
                        <div class="form-floating mb-3">
                            <input type="text" name="username" class="form-control border-0 bg-light" id="userInput" placeholder="Username" required style="border-radius: 12px;">
                            <label for="userInput" class="text-muted">Username</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="password" name="password" class="form-control border-0 bg-light" id="passInput" placeholder="Password" required style="border-radius: 12px;">
                            <label for="passInput" class="text-muted">Password</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm rounded-pill">
                            Sign In <i class="fas fa-sign-in-alt ms-2"></i>
                        </button>
                    </form>
                    
                    <div class="mt-4">
                        <hr class="opacity-25">
                        <a href="{{ url_for('index') }}" class="text-decoration-none small text-muted hover-primary">
                            <i class="fas fa-arrow-left me-1"></i> Return to Public View
                        </a>
                    </div>
                </div>
            </div>
            
        
        </div>
    </div>
</div>


{% endblock %}
